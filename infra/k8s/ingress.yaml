apiVersion: networking.k8s.io/v1
kind: Ingress
metadata: {name: ticketing, annotations: {nginx.ingress.kubernetes.io/limit-rps: "50"}}
spec: {rules: [{host: ticketing.example.com, http: {paths: [{path: /api, pathType: Prefix, backend: {service: {name: backend, port: {number: 3000}}}}, {path: /, pathType: Prefix, backend: {service: {name: frontend, port: {number: 80}}}}]}}]}
