apiVersion: apps/v1
kind: StatefulSet
metadata: {name: rabbitmq}
spec:
  serviceName: rabbitmq
  replicas: 1
  selector: {matchLabels: {app: rabbitmq}}
  template:
    metadata: {labels: {app: rabbitmq}}
    spec:
      containers:
        - name: rabbitmq
          image: rabbitmq:3-management-alpine
          ports: [{name: amqp, containerPort: 5672}]
          env:
            - {name: RABBITMQ_DEFAULT_USER, valueFrom: {secretKeyRef: {name: ticketing-secrets, key: RABBITMQ_DEFAULT_USER}}}
            - {name: RABBITMQ_DEFAULT_PASS, valueFrom: {secretKeyRef: {name: ticketing-secrets, key: RABBITMQ_DEFAULT_PASS}}}
          readinessProbe: {exec: {command: [rabbitmq-diagnostics, -q, ping]}, initialDelaySeconds: 10}
          resources:
            requests: {cpu: 100m, memory: 256Mi}
            limits: {cpu: "1", memory: 768Mi}
          volumeMounts: [{name: data, mountPath: /var/lib/rabbitmq}]
  volumeClaimTemplates:
    - metadata: {name: data}
      spec:
        accessModes: [ReadWriteOnce]
        resources: {requests: {storage: 5Gi}}
---
apiVersion: v1
kind: Service
metadata: {name: rabbitmq}
spec: {selector: {app: rabbitmq}, ports: [{name: amqp, port: 5672}]}
