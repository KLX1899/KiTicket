apiVersion: apps/v1
kind: StatefulSet
metadata: {name: postgres}
spec:
  serviceName: postgres
  replicas: 1
  selector: {matchLabels: {app: postgres}}
  template:
    metadata: {labels: {app: postgres}}
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports: [{name: postgres, containerPort: 5432}]
          env:
            - {name: POSTGRES_USER, valueFrom: {secretKeyRef: {name: ticketing-secrets, key: POSTGRES_USER}}}
            - {name: POSTGRES_PASSWORD, valueFrom: {secretKeyRef: {name: ticketing-secrets, key: POSTGRES_PASSWORD}}}
            - {name: POSTGRES_DB, valueFrom: {secretKeyRef: {name: ticketing-secrets, key: POSTGRES_DB}}}
          readinessProbe: {exec: {command: [sh, -c, "pg_isready -U $POSTGRES_USER -d $POSTGRES_DB"]}, initialDelaySeconds: 5}
          resources:
            requests: {cpu: 100m, memory: 256Mi}
            limits: {cpu: "1", memory: 1Gi}
          volumeMounts: [{name: data, mountPath: /var/lib/postgresql/data}]
  volumeClaimTemplates:
    - metadata: {name: data}
      spec:
        accessModes: [ReadWriteOnce]
        resources: {requests: {storage: 10Gi}}
---
apiVersion: v1
kind: Service
metadata: {name: postgres}
spec: {selector: {app: postgres}, ports: [{name: postgres, port: 5432}]}
