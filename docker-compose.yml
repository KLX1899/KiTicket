services:
  postgres:
    image: postgres:16-alpine
    environment: {POSTGRES_USER: ticketing, POSTGRES_PASSWORD: ticketing, POSTGRES_DB: ticketing}
    volumes: [postgres-data:/var/lib/postgresql/data]
    ports: ["${POSTGRES_HOST_PORT:-55432}:5432"]
    healthcheck: {test: ["CMD-SHELL","pg_isready -U ticketing"], interval: 5s, timeout: 3s, retries: 20}
  redis:
    image: redis:7-alpine
    ports: ["${REDIS_HOST_PORT:-56379}:6379"]
    healthcheck: {test: ["CMD", "redis-cli", "ping"], interval: 5s, timeout: 3s, retries: 20}
  rabbitmq:
    image: rabbitmq:3-management-alpine
    ports: ["${RABBITMQ_HOST_PORT:-55672}:5672", "${RABBITMQ_MANAGEMENT_PORT:-15672}:15672"]
    healthcheck: {test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"], interval: 10s, timeout: 5s, retries: 20}
  backend:
    build: ./backend
    environment:
      NODE_ENV: development
      DATABASE_URL: postgres://ticketing:ticketing@postgres:5432/ticketing
      REDIS_URL: redis://redis:6379
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
      JWT_SECRET: local-only-secret-for-compose-development
      DB_SYNCHRONIZE: "true"
      WAITING_ROOM_REQUIRED: "true"
    ports: ["3000:3000"]
    depends_on: {postgres: {condition: service_healthy}, redis: {condition: service_healthy}, rabbitmq: {condition: service_healthy}}
    healthcheck: {test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/api/health/ready"], interval: 10s, timeout: 5s, retries: 20}
  frontend:
    build: ./frontend
    ports: ["5173:8080"]
    depends_on: [backend]
    healthcheck: {test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/healthz"], interval: 10s, timeout: 5s, retries: 10}
volumes: {postgres-data: {}}
